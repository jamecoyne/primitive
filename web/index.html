<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mandelbrot — wgpu / wasm</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  canvas#wgpu {
    display: block;
    width: 100vw;
    height: 100vh;
    /* Strip every form of browser-injected canvas chrome — without these
       Chromium paints a 1px focus outline (rgb(0,95,204)) that bleeds into
       the rendered area and breaks pixel-perfect cross-platform parity. */
    box-shadow: none;
    outline: none;
    border: none;
  }
</style>
</head>
<body>
  <canvas id="wgpu"></canvas>
  <script type="module">
    import init from './wgpuweb.js';
    // Match drawing-buffer dimensions to the CSS viewport before the wasm
    // reads them in `parse_test_lock_from_url`/`State::new`. winit's
    // ResizeObserver picks up subsequent CSS-size changes from here.
    const c = document.getElementById('wgpu');
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    await init();
  </script>
</body>
</html>
