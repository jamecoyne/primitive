<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Primative</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  canvas#wgpu {
    display: block;
    /* `!important` is required: winit's web backend writes inline
       `style.width`/`style.height` on the canvas based on the initial
       PhysicalSize, which would otherwise pin the CSS size and prevent
       100vw/100vh from tracking viewport resizes. */
    width: 100vw !important;
    height: 100vh !important;
    /* Strip every form of browser-injected canvas chrome — without these
       Chromium paints a 1px focus outline (rgb(0,95,204)) that bleeds into
       the rendered area and breaks pixel-perfect cross-platform parity. */
    box-shadow: none;
    outline: none;
    border: none;
  }
</style>
</head>
<body>
  <canvas id="wgpu"></canvas>
  <script type="module">
    import init from './wgpuweb.js';
    // Set the drawing buffer to physical pixels (CSS pixels × devicePixelRatio)
    // so on Retina the canvas renders at full display resolution and CSS still
    // sizes the canvas to fill the viewport. Without the DPR multiplier the
    // buffer would be half the physical size on DPR=2 and winit would set
    // canvas.style to half the viewport — quarter screen visually.
    // winit's ResizeObserver picks up subsequent CSS-size changes from here.
    const c = document.getElementById('wgpu');
    const dpr = window.devicePixelRatio || 1;
    c.width  = Math.round(window.innerWidth  * dpr);
    c.height = Math.round(window.innerHeight * dpr);
    await init();
  </script>
</body>
</html>
