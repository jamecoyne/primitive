# Render-graph definition. Self-contained: GLSL source for every node lives
# in this file directly (multi-line literal strings — `'''…'''` — so no
# escape gymnastics for the shader code). The Rust side reads the strings
# and feeds them to wgpu/naga at startup; no separate shader files.
#
# Schema (per [[node]] entry):
#   id        : unique string identifier
#   kind      : node type — currently only "glsl" is implemented
#   vert      : (kind = "glsl") full GLSL source for the vertex stage
#   frag      : (kind = "glsl") full GLSL source for the fragment stage
#   inputs    : array of upstream node ids whose outputs feed this node.
#               Must be empty until the chaining/intermediate-texture path
#               lands; the graph builder rejects non-empty `inputs` today.
#   present   : if true, this node renders to the swapchain (surface) view
#               instead of an intermediate texture; exactly one node must
#               have `present = true`.

[[node]]
id = "mandelbrot"
kind = "glsl"
inputs = []
present = true

vert = '''
#version 450

// Fullscreen triangle — a single 3-vertex triangle that covers the
// viewport. Avoids the need for a vertex buffer entirely.
layout(location = 0) out vec2 v_uv;

void main() {
    vec2 pos = vec2(
        float((gl_VertexIndex & 1) * 4) - 1.0,
        float((gl_VertexIndex & 2) * 2) - 1.0
    );
    v_uv = pos * 0.5 + 0.5;
    gl_Position = vec4(pos, 0.0, 1.0);
}
'''

frag = '''
#version 450

layout(location = 0) in vec2 v_uv;
layout(location = 0) out vec4 o_color;

layout(set = 0, binding = 0) uniform Uniforms {
    vec2 resolution;
    vec2 mouse;     // pixel coords, top-left origin (winit y-down)
    float time;
    float _pad0;
    float _pad1;
    float _pad2;
} u;

void main() {
    float aspect = u.resolution.x / u.resolution.y;

    // Screen-space NDC of this fragment ([-aspect, +aspect] × [-1, +1]).
    vec2 ndc = v_uv * 2.0 - 1.0;
    ndc.x *= aspect;

    // Mouse → NDC. winit y is top-down, NDC y is bottom-up, so flip.
    vec2 m_uv = u.mouse / u.resolution;
    vec2 m_ndc = vec2(m_uv.x * 2.0 - 1.0, 1.0 - m_uv.y * 2.0);
    m_ndc.x *= aspect;

    float zoom = 1.6 + 0.6 * sin(u.time * 0.15);
    vec2 fractal_origin = vec2(-0.745, 0.10);
    // Subtracting m_ndc translates the mandelbrot so its center sits under the cursor.
    vec2 c = fractal_origin + (ndc - m_ndc) * zoom;

    vec2 z = vec2(0.0);
    const int MAX_ITER = 384;
    int i = 0;
    for (; i < MAX_ITER; ++i) {
        if (dot(z, z) > 256.0) break;
        z = vec2(z.x * z.x - z.y * z.y, 2.0 * z.x * z.y) + c;
    }

    if (i >= MAX_ITER) {
        o_color = vec4(0.0, 0.0, 0.0, 1.0);
        return;
    }

    float log_zn = log(dot(z, z)) * 0.5;
    float nu = log(log_zn / log(2.0)) / log(2.0);
    float smooth_i = float(i) + 1.0 - nu;
    float t = smooth_i / float(MAX_ITER);

    vec3 col = 0.5 + 0.5 * cos(6.28318 * (t + vec3(0.0, 0.33, 0.67)) + u.time * 0.4);
    o_color = vec4(col, 1.0);
}
'''
